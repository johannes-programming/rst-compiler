<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rst-compiler editor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 12px 16px;
      border-bottom: 1px solid #ccc;
      font-weight: bold;
    }

    #container {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    #left, #right {
      width: 50%;
      box-sizing: border-box;
      padding: 12px;
      overflow: auto;
    }

    #left {
      border-right: 1px solid #ccc;
      display: flex;
      flex-direction: column;
    }

    #editor-label, #preview-label {
      font-weight: bold;
      margin-bottom: 8px;
    }

    #editor {
      flex: 1;
      width: 100%;
      resize: none;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.4;
      padding: 12px;
    }

    #preview {
      min-height: 100%;
    }

    #error {
      color: red;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <header>rst-compiler editor</header>

  <div id="container">
    <section id="left">
      <div id="editor-label">reStructuredText</div>
      <textarea id="editor">Loading...</textarea>
    </section>

    <section id="right">
      <div id="preview-label">HTML preview</div>
      <div id="preview"></div>
      <div id="error"></div>
    </section>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
